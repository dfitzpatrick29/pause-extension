<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paused</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="container">
    <img class="brand-icon" src="../../PauseIcon.png" alt="Pause icon">
    <p class="wordmark">Pause</p>
    <div class="divider"></div>
    <p class="headline">This site has been paused.</p>
    <p class="site-name" id="blocked-site"></p>
    <p class="subtext">You added this site to your blocked list to help you stay intentional.</p>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-go-back">Go Back</button>
      <button class="btn btn-danger"  id="btn-unblock">Unblock This Site</button>
    </div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
